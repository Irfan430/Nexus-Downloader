version: '3.8'
services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - API_KEY=change_this_to_random_secret_key
    depends_on:
      - redis
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
