services:
  - type: web
    name: nexus-downloader
    runtime: node
    plan: free
    buildCommand: npm install && pip install yt-dlp gallery-dl
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: QUEUE_BACKEND
        value: memory
      - key: PUBLIC_MODE
        value: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
