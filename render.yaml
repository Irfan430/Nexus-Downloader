services:
  - type: web
    name: nexus-downloader
    runtime: node
    plan: free
    buildCommand: npm install && pip install yt-dlp gallery-dl
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: QUEUE_BACKEND
        value: memory
      - key: FILE_EXPIRE_MINUTES
        value: 30
      - key: SENT_FILE_EXPIRE_SECONDS
        value: 60
      - key: DOWNLOAD_CONCURRENCY
        value: 5
      - key: PUBLIC_MODE
        value: true
